<header>

    <div class="logo">
        <h1>ShopEase</h1>
    </div>

    <form action="{% url 'search_products' %}"
          method="GET"
          class="search-form">

        <input
            type="text"
            name="q"
            placeholder="Search products..."
        >

        <button type="submit">
            🔍
        </button>

    </form>

    <nav>

        <a href="{% url 'home' %}">
            Home
        </a>

        {% if user.is_authenticated %}

            <span class="welcome-user">
                Hello, {{ user.username }}
            </span>

            <a href="{% url 'view_cart' %}">
                Cart
            </a>

            <a href="{% url 'order_history' %}">
                Orders
            </a>

            <a href="{% url 'logout' %}">
                Logout
            </a>

        {% else %}

            <a href="{% url 'login' %}">
                Login
            </a>

            <a href="{% url 'register' %}">
                Register
            </a>

        {% endif %}

    </nav>

</header>
