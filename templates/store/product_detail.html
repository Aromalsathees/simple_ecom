{% extends 'base.html' %}

{% block content %}

<div class="product-detail">

    <img src="{{ product.image.url }}" alt="">

    <div class="product-info">

        <h2>{{ product.name }}</h2>

        <p>{{ product.description }}</p>

        <h3>₹{{ product.price }}</h3>

        <a href="{% url 'add_to_cart' product.id %}"><button>Add To Cart</button></a>
    </div>

</div>

{% endblock %}
