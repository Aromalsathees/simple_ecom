{% extends 'base.html' %}

{% block content %}

<h1 class="category-title">

    {{ category.name }}

</h1>

<div class="products">

    {% for product in products %}

    <div class="card">

        <img src="{{ product.image.url }}" alt="">

        <h3>{{ product.name }}</h3>

        <p>{{ product.description|truncatewords:10 }}</p>

        <p class="price">

            ₹{{ product.price }}

        </p>

        <a href="{% url 'product_detail' product.id %}">

            <button>
                View Product
            </button>

        </a>

    </div>

    {% endfor %}

</div>

{% endblock %}
