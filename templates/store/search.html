{% extends 'base.html' %}

{% block title %}
Search
{% endblock %}

{% block content %}

<h2>
    Search Results For "{{ query }}"
</h2>

<div class="products">

    {% for product in products %}

    <div class="card">

        <img src="{{ product.image.url }}" alt="">

        <h3>{{ product.name }}</h3>

        <p>{{ product.description }}</p>

        <p class="price">
            ₹{{ product.price }}
        </p>

    </div>

    {% endfor %}

</div>

{% endblock %}
